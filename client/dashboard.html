<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Intake</title>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Intake</a>
  <a href="index.html">Chat</a>
  <a href="dashboard.html" class="active">Dashboard</a>
  <div class="nav-spacer"></div>
  <span class="nav-time" id="nav-time"></span>
</nav>

<div class="page">

  <div class="page-header">
    <div>
      <div class="page-title">Task Queue</div>
      <div class="page-sub">Patient requests sorted by urgency</div>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="load()">Refresh</button>
  </div>

  <div id="error-banner"></div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">High</div>
      <div class="stat-value high" id="stat-high">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Medium</div>
      <div class="stat-value med" id="stat-med">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Low</div>
      <div class="stat-value low" id="stat-low">—</div>
    </div>
  </div>

  <div class="columns">

    <div>
      <div class="col-header">
        <div class="col-dot high"></div>
        <span class="col-title">High urgency</span>
        <span class="col-count" id="count-high">0</span>
      </div>
      <div id="col-high">
        <div class="col-empty">Loading…</div>
      </div>
    </div>

    <div>
      <div class="col-header">
        <div class="col-dot med"></div>
        <span class="col-title">Medium urgency</span>
        <span class="col-count" id="count-med">0</span>
      </div>
      <div id="col-med">
        <div class="col-empty">Loading…</div>
      </div>
    </div>

    <div>
      <div class="col-header">
        <div class="col-dot low"></div>
        <span class="col-title">Low urgency</span>
        <span class="col-count" id="count-low">0</span>
      </div>
      <div id="col-low">
        <div class="col-empty">Loading…</div>
      </div>
    </div>

  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
