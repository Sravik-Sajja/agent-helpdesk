<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patient Intake</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 12px;
      font-size: 14px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 12px;
      background: #f4f4f4;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <nav style="margin-bottom:32px">
    <a href="index.html">Intake</a>
    <a href="dashboard.html">Dashboard</a>
  </nav>

  <h1>Patient Request Intake</h1>

  <p>Enter patient message below:</p>

  <textarea id="inputText" placeholder="e.g. I want to reschedule my cardiology appointment to next week afternoon"></textarea>

  <br/>

  <button onclick="sendRequest()">Submit</button>

  <div class="result" id="resultBox"></div>

  <script>
    let storedContext = null;

    async function sendRequest() {
      const text = document.getElementById("inputText").value;

      const resultBox = document.getElementById("resultBox");
      resultBox.innerText = "Processing...";

      try {
        const body = { message: text };
        if (storedContext) body.previous_context = storedContext;

        const response = await fetch("http://localhost:8000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        const data = await response.json();

        if (data.action === "follow_up_questions") {
          storedContext = data.context;
        } else {
          storedContext = null;
        }

        resultBox.innerText = JSON.stringify(data, null, 2);

      } catch (err) {
        resultBox.innerText = "Error connecting to server: " + err.message;
      }
    }
  </script>

</body>
</html>
