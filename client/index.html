<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patient Intake</title>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="logo">INTAKE</a>
  <a href="index.html" class="active">Chat</a>
  <a href="dashboard.html">Dashboard</a>
</nav>

<div id="chat">
  <div id="empty">
    <div class="icon">💬</div>
    <div>Send a message to get started</div>
  </div>
</div>

<div id="input-area">
  <textarea id="msg" placeholder="Describe your request…" rows="1"></textarea>
  <button id="send" onclick="send()">Send</button>
</div>

<div id="panel-overlay" onclick="closePanel(event)">
  <div id="detail-panel">
    <div id="panel-header">
      <h2>Response Details</h2>
      <button id="panel-close" onclick="closePanel()">×</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
